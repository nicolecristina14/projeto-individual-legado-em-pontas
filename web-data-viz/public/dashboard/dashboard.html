<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" href="../assets/imgs/favicon2.ico.png">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legado em Pontas | Quiz Personalidade</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Barlow:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/dashboards.css">
    <script src="../js/sessao.js"></script>

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left dash-header">
            <h1>Legado em Pontas</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./quiz_personalidade.html">
                    <h3>Quiz História</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./quiz.html">
                    <h3>Quiz Personalidade</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Dashboard</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>
        <div class="dash-right">
            <div class="dash">
                <div class="kpi-container">
                    <div class="kpi-card">
                        <h4>Total de Participantes</h4>
                        <p id="kpi_total_usuarios">0</p>
                    </div>
                    <div class="kpi-card">
                        <h4>Média de Acertos (História)</h4>
                        <p id="kpi_media_acertos">0%</p>
                    </div>
                    <div class="kpi-card">
                        <h4>Perfil Mais Comum</h4>
                        <p id="kpi_perfil_comum" style="font-size: 1.2rem;">--</p>
                    </div>
                </div>

                <div class="graficos-grid">
                    <div class="grafico-card">
                        <h3 class="titulo-grafico">Distribuição de Personalidades</h3>
                        <div style="flex-grow: 1; position: relative;">
                            <canvas id="chartPersonalidade"></canvas>
                        </div>
                    </div>
                    <div class="grafico-card">
                        <h3 class="titulo-grafico">Desempenho em História</h3>
                        <canvas id="chartHistoria"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>


</body>

</html>

<script>
window.onload = function () {
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    exibirDadosDasKpis();
    exibirDadosDosGraficos();
};

function exibirDadosDasKpis() {
    fetch("/medidas/kpis", { cache: 'no-store' }).then(function (response) {
        if (response.ok) {
            response.json().then(function (resposta) {
                console.log(`Dados das KPIs recebidos: ${JSON.stringify(resposta)}`);
             
                var dados = resposta[0];
                document.getElementById("kpi_total_usuarios").innerHTML = dados.total;
                document.getElementById("kpi_media_acertos").innerHTML = dados.media + "%";
                
                // Lógica para transformar o número do perfil comum em nome na KPI
                var nomePerfil = "";
                var p = dados.perfil;
                if (p == 1) nomePerfil = "Olenewa";
                else if (p == 2) nomePerfil = "Dalal";
                else if (p == 3) nomePerfil = "Botafogo";
                else if (p == 4) nomePerfil = "Kerche";
                else if (p == 5) nomePerfil = "Haydée";
                else if (p == 6) nomePerfil = "Sagioro";
                else nomePerfil = "Não definido";

                document.getElementById("kpi_perfil_comum").innerHTML = nomePerfil;

                // Aproveitamos a média da KPI para plotar o gráfico de rosca
                plotarGraficoHistoria(dados.media);
            });
        } else {
            console.error('Erro na obtenção dos dados das KPIs');
        }
    });
}

function exibirDadosDosGraficos() {
    fetch("/medidas/graficos", { cache: 'no-store' }).then(function (response) {
        if (response.ok) {
            response.json().then(function (resposta) {
                console.log(`Dados dos Gráficos recebidos: ${JSON.stringify(resposta)}`);
                
                // Como o console mostrou que 'resposta' já é a lista, passamos ela direto
                plotarGraficoPersonalidade(resposta);
            });
        }
    });
}

function plotarGraficoPersonalidade(dadosBanco) {
    let labels = [];
    let valores = [];

    // Agora o loop vai funcionar porque dadosBanco é o array direto
    for (let i = 0; i < dadosBanco.length; i++) {
        labels.push(dadosBanco[i].nome_bailarina);
        valores.push(dadosBanco[i].quantidade);
    }

    const ctxPerso = document.getElementById('chartPersonalidade').getContext('2d');
    
    new Chart(ctxPerso, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Usuários por Perfil',
                data: valores,
                backgroundColor: '#da7d30'
            }]
        },
        options: { 
            indexAxis: 'y', 
            responsive: true, 
            maintainAspectRatio: false 
        }
    });
}

function plotarGraficoHistoria(mediaAcertos) {
    const ctxHist = document.getElementById('chartHistoria').getContext('2d');
    
    // Calculamos a porcentagem de erros para completar 100%
    var acertos = Number(mediaAcertos);
    var erros = 100 - acertos;

    new Chart(ctxHist, {
        type: 'doughnut',
        data: {
            labels: ['Acertos', 'Erros'],
            datasets: [{
                data: [acertos, erros],
                backgroundColor: ['#da7d30', '#fde8dc'],
                hoverOffset: 4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
</script>
