<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Legado em Pontas | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" href="./imgs/favicon2.ico.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <!--Header-->
    <div class="header">
        <div class="container">
            <ul class="navbar1">
                <li>
                    <a href="index.html">Sobre</a>
                </li>
                <a href="historia.html">História</a>
                </li>
            </ul>
            <ul class="navbar2">
                <li class="agora">
                    <a href="#">Login</a>
                </li>
                <li>
                    <h2>|</h2>

                </li>
                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>


    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container-flex">
            <div class="card card-login">
                <h2>Olá de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <div class="input-container"> <input id="senha_input" type="password" placeholder="******" />
                            <div class="olho" onclick="visualizar()" style="cursor: pointer;">
                                <img id="olho_senha" src="../assets/eye2.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <button class="botao" onclick="entrar()">Entrar</button>
            </div>

        </div>
        <div id="div_aguardar" class="loading-div">
            <img src="../assets/aguarde-pink3.gif" id="loading-gif">
        </div>
    </div>


</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/quiz_personalidade.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    cardErro.style.display = "block"
                    mensagem_erro.innerHTML = "Email e/ou senha inválido(s)"
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

    function visualizar() {
        var input = document.getElementById('senha_input');
        var img = document.getElementById('olho_senha');

        if (input.type === 'password') {
            input.type = 'text';
            img.src = "../assets/eye.png"
        } else {
            input.type = 'password';
            img.src = "../assets/eye2.png"
        }
    }

</script>
